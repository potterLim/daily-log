spring:
  datasource:
    url: jdbc:h2:file:./build/daylog-local-db;MODE=PostgreSQL;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  thymeleaf:
    cache: false
day-log:
  logs-root-path: build/local-logs
