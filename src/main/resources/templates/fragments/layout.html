<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(content, pageTitle)">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${pageTitle} + ' - DailyLog'">DailyLog</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" th:href="@{/css/site.css}" />
</head>
<body>
<header>
    <nav class="navbar navbar-expand-sm mb-3">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">DailyLog</a>
            <div class="collapse navbar-collapse justify-content-end">
                <div sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline btn-sm">로그아웃</button>
                    </form>
                </div>
                <div sec:authorize="isAnonymous()">
                    <a class="btn btn-outline btn-sm me-1" th:href="@{/login}">로그인</a>
                    <a class="btn btn-outline btn-sm" th:href="@{/register}">회원가입</a>
                </div>
            </div>
        </div>
    </nav>
</header>

<div class="container mt-4">
    <main role="main" class="pb-3" th:replace="${content}">
        <section></section>
    </main>
</div>

<footer class="footer text-center py-3 text-muted border-top mt-5">
    <div class="container">
        &copy; 2025 DailyLog · Developed by
        <a href="https://github.com/potterLim" target="_blank" rel="noopener noreferrer">
            potterLim
        </a>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/site.js}"></script>
</body>
</html>
