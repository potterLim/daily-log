<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::section}, '회원가입')}">
<section>
    <div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="card shadow-sm p-4" style="width: 100%; max-width: 400px;">
            <h2 class="text-center mb-4">회원가입</h2>
            <form th:action="@{/register}" th:object="${registerRequestDto}" method="post">
                <div class="mb-3">
                    <label for="userName" class="form-label">아이디</label>
                    <input id="userName" th:field="*{userName}" class="form-control" autocomplete="username" />
                    <div class="text-danger mt-1" th:errors="*{userName}"></div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">비밀번호</label>
                    <input id="password" th:field="*{password}" type="password" class="form-control" autocomplete="new-password" />
                    <div class="text-danger mt-1" th:errors="*{password}"></div>
                </div>

                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">비밀번호 확인</label>
                    <input id="confirmPassword" th:field="*{confirmPassword}" type="password" class="form-control" autocomplete="new-password" />
                    <div class="text-danger mt-1" th:errors="*{confirmPassword}"></div>
                </div>

                <button type="submit" class="btn btn-primary w-100 mb-2">회원가입</button>

                <div class="text-center">
                    <a th:href="@{/login}" class="text-decoration-none">로그인으로 돌아가기</a>
                </div>
            </form>
        </div>
    </div>
</section>
</html>
